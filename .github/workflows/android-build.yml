name: Android Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android NDK
      id: setup-ndk
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r26d
        add-to-path: true

    - name: Set NDK environment variable
      run: |
        echo "ANDROID_NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}" >> $GITHUB_ENV

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake ninja-build pkg-config git nlohmann-json3-dev

    - name: Setup Android sdl3 libraries
      run: |
        export ANDROID_NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}
                        export SDL_REF=release-3.4.x
                        export SDL_REQUIRED_VERSION=3.4.0
        export FORCE_REBUILD_SDL=1
        ./build/FullBuildandroid.sh

    - name: Update Android app with native libraries
      env:
        ABI: arm64-v8a
      run: |
        ./build/update-android-app.sh

    - name: Make Gradle wrapper executable
      run: |
        chmod +x Android/gradlew

    - name: Setup Gradle cache
      uses: gradle/actions/setup-gradle@v4
      with:
        validate-wrappers: false

    - name: Build Android APKs
      working-directory: Android
      run: |
        ./gradlew --no-daemon assembleDebug assembleRelease --stacktrace

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: Android/app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: error

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release-apk
        path: Android/app/build/outputs/apk/release/app-release.apk
        if-no-files-found: error
