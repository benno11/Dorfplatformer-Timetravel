name: Build Game

on:
  push:
    branches: [main, develop]
    tags:
      - "v*"
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional tag to draft a release for, e.g. v2.0.02"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: build-game-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare_release:
    name: Prepare Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_enabled: ${{ steps.release.outputs.release_enabled }}
      release_tag: ${{ steps.release.outputs.release_tag }}

    steps:
      - name: Checkout game
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve release mode
        id: release
        shell: bash
        run: |
          set -euo pipefail

          release_enabled=false
          release_tag=""

          if [[ "${GITHUB_REF:-}" == refs/tags/* ]]; then
            release_enabled=true
            release_tag="${GITHUB_REF#refs/tags/}"
          elif [[ -n "${{ inputs.release_tag }}" ]]; then
            release_enabled=true
            release_tag="${{ inputs.release_tag }}"
          elif [[ "${GITHUB_EVENT_NAME:-}" != "pull_request" ]]; then
            release_enabled=true
            release_tag="draft-${GITHUB_REF_NAME//\//-}-${GITHUB_RUN_NUMBER}"
          fi

          echo "Resolved release_enabled=$release_enabled"
          echo "Resolved release_tag=$release_tag"
          echo "release_enabled=$release_enabled" >> "$GITHUB_OUTPUT"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"

      - name: Create draft release
        if: steps.release.outputs.release_enabled == 'true'
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.release.outputs.release_tag }}
          tag_name: ${{ steps.release.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          draft: true
          generate_release_notes: true
          overwrite_files: true

  desktop:
    name: Desktop (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    permissions:
      contents: write
    needs: prepare_release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            triplet: x64-linux
          - os: windows-latest
            triplet: x64-windows

    steps:
      - name: Checkout game
        uses: actions/checkout@v6

      - name: Install Linux build tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build autoconf autoconf-archive automake libtool pkg-config

      - name: Install Windows build tools
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install ninja -y --no-progress

      - name: Set up MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Checkout vcpkg
        uses: actions/checkout@v6
        with:
          repository: microsoft/vcpkg
          path: .ci/vcpkg

      - name: Cache vcpkg packages
        uses: actions/cache@v5
        with:
          path: |
            .ci/vcpkg/downloads
            .ci/vcpkg/buildtrees
            .ci/vcpkg/packages
            .ci/vcpkg/installed
          key: vcpkg-${{ runner.os }}-${{ matrix.triplet }}-${{ hashFiles('CMakeLists.txt', '.github/workflows/android-build.yml') }}

      - name: Bootstrap vcpkg
        shell: pwsh
        run: |
          $vcpkgRoot = Join-Path $env:GITHUB_WORKSPACE ".ci/vcpkg"
          if ($env:RUNNER_OS -eq "Windows") {
            & (Join-Path $vcpkgRoot "bootstrap-vcpkg.bat") -disableMetrics
          } else {
            & (Join-Path $vcpkgRoot "bootstrap-vcpkg.sh") -disableMetrics
          }

      - name: Install desktop dependencies
        shell: pwsh
        run: |
          $vcpkgRoot = Join-Path $env:GITHUB_WORKSPACE ".ci/vcpkg"
          $vcpkgExe = if ($env:RUNNER_OS -eq "Windows") { Join-Path $vcpkgRoot "vcpkg.exe" } else { Join-Path $vcpkgRoot "vcpkg" }
          & $vcpkgExe install sdl3 sdl3-image sdl3-ttf curl nlohmann-json --triplet "${{ matrix.triplet }}"

      - name: Configure
        shell: pwsh
        run: |
          $vcpkgRoot = Join-Path $env:GITHUB_WORKSPACE ".ci/vcpkg"
          cmake -S . -B build-ci -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$vcpkgRoot/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET="${{ matrix.triplet }}" `
            -DPLATFORMER_REQUIRE_SDL3_MIXER=ON

      - name: Build
        shell: pwsh
        run: |
          cmake --build build-ci --config Release --parallel

      - name: Package desktop release
        if: needs.prepare_release.outputs.release_enabled == 'true'
        shell: pwsh
        run: |
          $packageRoot = Join-Path $env:GITHUB_WORKSPACE ("release-" + "${{ matrix.triplet }}")
          $archiveRoot = Join-Path $env:GITHUB_WORKSPACE "release"
          $assetName = "platformer-${{ matrix.triplet }}.zip"
          $assetPath = Join-Path $archiveRoot $assetName
          $vcpkgBin = Join-Path $env:GITHUB_WORKSPACE ".ci/vcpkg/installed/${{ matrix.triplet }}/bin"

          if (Test-Path $packageRoot) { Remove-Item $packageRoot -Recurse -Force }
          if (Test-Path $assetPath) { Remove-Item $assetPath -Force }
          New-Item -ItemType Directory -Force -Path $packageRoot | Out-Null
          New-Item -ItemType Directory -Force -Path $archiveRoot | Out-Null

          Copy-Item "assets" -Destination (Join-Path $packageRoot "assets") -Recurse -Force
          Copy-Item "README.md" -Destination $packageRoot -Force
          Copy-Item "LICENSE" -Destination $packageRoot -Force

          if ($env:RUNNER_OS -eq "Windows") {
            Copy-Item "build-ci/platformer.exe" -Destination $packageRoot -Force
            if (Test-Path "build-ci/sheet_config.exe") {
              Copy-Item "build-ci/sheet_config.exe" -Destination $packageRoot -Force
            }
            Get-ChildItem "build-ci" -Filter "*.dll" -File -ErrorAction SilentlyContinue | Copy-Item -Destination $packageRoot -Force
            if (Test-Path $vcpkgBin) {
              Get-ChildItem $vcpkgBin -Filter "*.dll" -File -ErrorAction SilentlyContinue | Copy-Item -Destination $packageRoot -Force
            }
          } else {
            Copy-Item "build-ci/platformer" -Destination $packageRoot -Force
            if (Test-Path "build-ci/sheet_config") {
              Copy-Item "build-ci/sheet_config" -Destination $packageRoot -Force
            }
          }

          Compress-Archive -Path (Join-Path $packageRoot "*") -DestinationPath $assetPath -Force

      - name: Upload desktop release assets
        if: needs.prepare_release.outputs.release_enabled == 'true'
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ needs.prepare_release.outputs.release_tag }}
          tag_name: ${{ needs.prepare_release.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          draft: true
          overwrite_files: true
          fail_on_unmatched_files: true
          files: release/*.zip

  android:
    name: Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write
    needs: prepare_release

    steps:
      - name: Checkout game
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1.6.0
        with:
          ndk-version: r26d
          add-to-path: true

      - name: Install host packages
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang cmake ninja-build pkg-config git unzip zip nlohmann-json3-dev

      - name: Make build scripts executable
        run: |
          chmod +x build/*.sh
          chmod +x Android/gradlew

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          validate-wrappers: false

      - name: Build native Android game library
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          ABIS: arm64-v8a,armeabi-v7a,x86_64,x86
          ANDROID_ALLOW_NO_CURL: "1"
          FORCE_REBUILD_SDL: "1"
          SDL_REF: release-3.4.x
          SDL_REQUIRED_VERSION: 3.4.0
          TERM: xterm
        run: |
          ./build/android-prod.sh

      - name: Sync native library and assets
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          ABIS: arm64-v8a,armeabi-v7a,x86_64,x86
          ANDROID_ALLOW_NO_CURL: "1"
        run: |
          ./build/update-android-app.sh

      - name: Build APKs
        working-directory: Android
        run: |
          ./gradlew --no-daemon assembleDebug assembleRelease --stacktrace

      - name: Upload Android release assets
        if: needs.prepare_release.outputs.release_enabled == 'true'
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ needs.prepare_release.outputs.release_tag }}
          tag_name: ${{ needs.prepare_release.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          draft: true
          overwrite_files: true
          fail_on_unmatched_files: true
          files: Android/app/build/outputs/apk/**/*.apk
